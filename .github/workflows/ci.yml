name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Check Python syntax
        run: python -m compileall -q src scripts tests test_pipeline.py

      - name: Check gateway syntax
        run: node --check cloudflare/exact-2026-gateway/worker.js

      - name: Check generated Colab notebook
        run: |
          python scripts/create_colab_notebook.py
          git diff --exit-code -- EXACT_2026_Colab_Deployment.ipynb

      - name: Run tests
        run: python -m pytest -q
