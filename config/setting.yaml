app:
  project_name: Exact 2026
  version: 1.0.0
  debug: true

# Cau hinh LLM ── 2 model dual-specialist + 1 server llama.cpp
# BTC Q3 (single-resident): supervisor swap process khi doi role.
# BTC Q5 (OpenAI-style serving): dung llama-server expose /v1/chat/completions.
llm:
  server:
    binary: bin/llama-cpp/llama-server.exe
    host: 127.0.0.1
    port: 8001
    base_url: http://127.0.0.1:8001/v1
    api_key: not-needed
    startup_timeout_s: 60
    shutdown_timeout_s: 5
    n_ctx: 4096
    n_gpu_layers: 0      # 0 = CPU only. -1 = full GPU. Override: env LLAMA_NGL.
    extra_args: []       # vd: ["--flash-attn", "--mlock"]

  coder:
    model_name: qwen2.5-coder-7b-instruct
    model_path: models/qwen2.5-coder-7b-instruct.Q4_K_M.gguf
    temperature: 0.0
    max_tokens: 1024

  instruct:
    model_name: qwen2.5-7b-instruct
    model_path: models/qwen2.5-7b-instruct.Q4_K_M.gguf
    temperature: 0.0
    max_tokens: 1024

api:
  request_budget_seconds: 600   # cuoc thi: set 58 qua env EXACT_REQUEST_BUDGET_SECONDS

rag:
  reranker: BAAI/bge-reranker-base

embedding:
  model_name: BAAI/bge-m3
  base_url: http://localhost:11434

retrieval:
  threshold: 0.5
  top_k: 5

storage:
  data_dir: data
  vector_db: storage/vector_db
  collection_name: exact

langsmith:
  project: Exact 2026
  endpoint: https://api.smith.langchain.com

# Knowledge distillation (offline pipeline)
# Goi teacher LLM de TRICH XUAT cong thuc tu CoT co san trong dataset BTC,
# KHONG goi tai runtime.
distillation:
  teacher:
    provider: gemini                  # gemini | openai
    model_name: gemini-2.5-flash-lite # re nhat trong dong Flash
    temperature: 0.1                  # extraction can deterministic
    max_output_tokens: 1024           # output ngan vi chi extract
    api_key_env: GOOGLE_API_KEY       # ten env var, KHONG hardcode key
  pipeline:
    mode: extract                     # extract | generate
    concurrency: 8                    # so request song song
    max_retries: 3
    retry_backoff_s: 2.0
    timeout_s: 60
  paths:
    raw_output: data/distilled/physics_kb.raw.jsonl
    verified_output: data/distilled/physics_kb.verified.jsonl
    cost_log: data/distilled/cost_log.jsonl