app:
  project_name: Exact 2026
  version: 1.0.0
  debug: false

llm:
  server:
    binary: llama-server
    host: 127.0.0.1
    port: 8001
    base_url: http://127.0.0.1:8001/v1
    api_key: not-needed
    startup_timeout_s: 180
    shutdown_timeout_s: 5
    n_ctx: 4096
    n_gpu_layers: -1      # -1 = full Metal GPU offload (Apple Silicon)
    extra_args: []       # vd: ["--flash-attn", "--mlock"]

  coder:
    model_name: qwen2.5-coder-7b-instruct
    model_path: models/exact-2026/qwen2.5-coder-7b-instruct.Q4_K_M.gguf
    temperature: 0.0
    max_tokens: 1024

  instruct:
    model_name: qwen2.5-7b-instruct
    model_path: models/exact-2026/Qwen2.5-7B-Instruct.Q4_K_M.gguf
    temperature: 0.0
    max_tokens: 384

api:
  request_budget_seconds: 58    # Q&A Q13: hard cap 60s/request; keep 2s margin.
  cancellation_grace_seconds: 3
  min_explanation_seconds: 20   # Preserve solver answer instead of timing out during model swap.
  warmup_role: coder             # Avoid spending the first request loading the coder model.

# Solver subprocess settings (Q13 timing + Slide 27 iterative refinement)
solver:
  timeout_s: 20                   # Q13: was 30s, reduced to 20s for safety margin
  max_retries: 1                  # Slide 27: if solver fails, retry formalizer once
  memory_mb: 1536                 # Per generated-code subprocess memory ceiling.

rag:
  reranker: BAAI/bge-reranker-base

embedding:
  model_name: BAAI/bge-m3
  base_url: http://localhost:11434

retrieval:
  threshold: 0.5
  top_k: 5

storage:
  data_dir: data
  vector_db: storage/vector_db
  collection_name: exact

langsmith:
  project: Exact 2026
  endpoint: https://api.smith.langchain.com

# Knowledge extraction (offline pipeline)
# Closed-source teacher APIs are prohibited. Keep provider disabled unless an
# auditable open-source, self-hosted teacher pipeline is added and disclosed.
distillation:
  teacher:
    provider: none
    model_name: ""
    temperature: 0.1                  # extraction can deterministic
    max_output_tokens: 1024           # output ngan vi chi extract
    api_key_env: ""
  pipeline:
    mode: extract                     # extract | generate
    concurrency: 8                    # so request song song
    max_retries: 3
    retry_backoff_s: 2.0
    timeout_s: 60
  paths:
    raw_output: data/distilled/physics_kb.raw.jsonl
    verified_output: data/distilled/physics_kb.verified.jsonl
    cost_log: data/distilled/cost_log.jsonl
