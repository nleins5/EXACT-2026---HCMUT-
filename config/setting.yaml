app:
  project_name: "Exact 2026"
  version: "1.0.0"
  debug: true

llm:
  model_path: "models/deepseek-r1-0528-qwen3-8b.Q4_K_M.gguf"
  temperature: 0.0
  n_ctx: 4096
  n_gpu_layers: 0  # 0 = CPU only. -1 = full GPU. RTX 2050 4GB chi offload duoc ~20 layers.

rag:
  reranker: "BAAI/bge-reranker-base"

embedding:
  model_name: "BAAI/bge-m3"
  base_url: "http://localhost:11434"

retrieval:
  threshold: 0.5
  top_k: 5

storage:
  data_dir: "data"
  vector_db: "storage/vector_db"
  collection_name: "exact"

langsmith:
  project: "Exact 2026"
  endpoint: "https://api.smith.langchain.com"